name: Release Images

on:
  workflow_dispatch:
    inputs:
      publish_images:
        description: "Publish GHCR images from this manual run"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*.*.*"

jobs:
  release-evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install release evidence dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r apps/api/requirements.txt
      - name: Build deterministic eval report
        env:
          PYTHONPATH: ${{ github.workspace }}/packages/evals:${{ github.workspace }}/packages/shared_contracts
        run: |
          set -euo pipefail
          mkdir -p /tmp/repopilot-release-evidence/eval-reports
          args=(
            --out-dir /tmp/repopilot-release-evidence/eval-reports
            --report-name v1-local-latest
          )
          strict_release=false
          if [[ "${GITHUB_REF}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish_images }}" == "true" ]]; then
            strict_release=true
          fi
          if [[ "${strict_release}" != true ]]; then
            args+=(--allow-failed-gates)
          fi
          PYTHONDONTWRITEBYTECODE=1 python -m repopilot_evals.report "${args[@]}"
      - name: Build source-boundary manifest
        run: |
          set -euo pipefail
          mkdir -p /tmp/repopilot-release-evidence/release-artifacts
          PYTHONDONTWRITEBYTECODE=1 python scripts/source_boundary_manifest.py \
            --json-out /tmp/repopilot-release-evidence/release-artifacts/source-boundary-manifest.json \
            --md-out /tmp/repopilot-release-evidence/release-artifacts/source-boundary-manifest.md
      - name: Build credential smoke summary
        run: |
          set -euo pipefail
          args=(
            --json-out /tmp/repopilot-release-evidence/release-artifacts/credential-smoke-summary.json
            --md-out /tmp/repopilot-release-evidence/release-artifacts/credential-smoke-summary.md
          )
          strict_release=false
          if [[ "${GITHUB_REF}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish_images }}" == "true" ]]; then
            strict_release=true
          fi
          if [[ "${strict_release}" != true ]]; then
            args+=(--allow-blocked)
          fi
          PYTHONDONTWRITEBYTECODE=1 python scripts/credential_smoke.py "${args[@]}"
      - name: Install scanner evidence tools
        run: python -m pip install semgrep pip-audit
      - name: Build security scanner snapshot
        run: |
          set -euo pipefail
          args=(
            --json-out /tmp/repopilot-release-evidence/release-artifacts/security-scanner-snapshot.json
            --md-out /tmp/repopilot-release-evidence/release-artifacts/security-scanner-snapshot.md
          )
          strict_release=false
          if [[ "${GITHUB_REF}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish_images }}" == "true" ]]; then
            strict_release=true
          fi
          if [[ "${strict_release}" != true ]]; then
            args+=(--allow-warnings --allow-blockers)
          fi
          PYTHONDONTWRITEBYTECODE=1 SEMGREP_ENABLED=true DEPENDENCY_AUDIT_ENABLED=true CODEQL_ENABLED=true python scripts/security_scanner_snapshot.py "${args[@]}"
      - name: Validate deployment docs and topology
        run: |
          set -euo pipefail
          args=(
            --json-out /tmp/repopilot-release-evidence/release-artifacts/deployment-validation.json
            --md-out /tmp/repopilot-release-evidence/release-artifacts/deployment-validation.md
          )
          strict_release=false
          if [[ "${GITHUB_REF}" == refs/tags/* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish_images }}" == "true" ]]; then
            strict_release=true
          fi
          if [[ "${strict_release}" != true ]]; then
            args+=(--allow-warnings)
          fi
          PYTHONDONTWRITEBYTECODE=1 python scripts/deployment_validate.py \
            "${args[@]}"
      - name: Upload release evidence
        uses: actions/upload-artifact@v6
        with:
          name: release-evidence-${{ github.run_id }}
          path: /tmp/repopilot-release-evidence/
          if-no-files-found: error

  build-images:
    runs-on: ubuntu-latest
    needs: release-evidence
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Resolve GHCR image names
        id: images
        run: |
          set -euo pipefail
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "api=ghcr.io/${owner_lc}/repopilot-api" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${owner_lc}/repopilot-web" >> "$GITHUB_OUTPUT"
          echo "sandbox=ghcr.io/${owner_lc}/repopilot-sandbox" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_images == true) }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: API image metadata
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.api }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - name: Web image metadata
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.web }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - name: Sandbox image metadata
        id: sandbox-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.sandbox }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - name: Build API image
        id: api-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_images == true) }}
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}
      - name: Build web image
        id: web-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: runner
          push: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_images == true) }}
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
      - name: Build sandbox image
        id: sandbox-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/sandbox_runner/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_images == true) }}
          tags: ${{ steps.sandbox-meta.outputs.tags }}
          labels: ${{ steps.sandbox-meta.outputs.labels }}
      - name: Write image digest evidence
        run: |
          set -euo pipefail
          mkdir -p /tmp/repopilot-release-images
          cat > /tmp/repopilot-release-images/images.json <<JSON
          {
            "source_sha": "${GITHUB_SHA}",
            "source_ref": "${GITHUB_REF}",
            "workflow_run": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "published": "${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_images == true) }}",
            "images": {
              "api": {
                "name": "${{ steps.images.outputs.api }}",
                "tags": ${{ toJson(steps.api-meta.outputs.tags) }},
                "digest": "${{ steps.api-build.outputs.digest }}"
              },
              "web": {
                "name": "${{ steps.images.outputs.web }}",
                "tags": ${{ toJson(steps.web-meta.outputs.tags) }},
                "digest": "${{ steps.web-build.outputs.digest }}"
              },
              "sandbox": {
                "name": "${{ steps.images.outputs.sandbox }}",
                "tags": ${{ toJson(steps.sandbox-meta.outputs.tags) }},
                "digest": "${{ steps.sandbox-build.outputs.digest }}"
              }
            }
          }
          JSON
          cat > /tmp/repopilot-release-images/images.md <<MD
          # RepoPilot Release Images

          - Source SHA: \`${GITHUB_SHA}\`
          - Source ref: \`${GITHUB_REF}\`
          - Workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Published: \`${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_images == true) }}\`

          | Image | Name | Digest |
          |---|---|---|
          | API | \`${{ steps.images.outputs.api }}\` | \`${{ steps.api-build.outputs.digest }}\` |
          | Web | \`${{ steps.images.outputs.web }}\` | \`${{ steps.web-build.outputs.digest }}\` |
          | Sandbox | \`${{ steps.images.outputs.sandbox }}\` | \`${{ steps.sandbox-build.outputs.digest }}\` |
          MD
      - name: Upload image digest evidence
        uses: actions/upload-artifact@v6
        with:
          name: release-images-${{ github.run_id }}
          path: /tmp/repopilot-release-images/
          if-no-files-found: error
