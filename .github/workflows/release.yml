name: Release Images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  release-evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install release evidence dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r apps/api/requirements.txt
      - name: Build deterministic eval report
        env:
          PYTHONPATH: ${{ github.workspace }}/packages/evals:${{ github.workspace }}/packages/shared_contracts
        run: |
          set -euo pipefail
          mkdir -p /tmp/repopilot-release-evidence/eval-reports
          PYTHONDONTWRITEBYTECODE=1 python -m repopilot_evals.report \
            --out-dir /tmp/repopilot-release-evidence/eval-reports \
            --report-name v1-local-latest \
            --allow-failed-gates
      - name: Build source-boundary manifest
        run: |
          set -euo pipefail
          mkdir -p /tmp/repopilot-release-evidence/release-artifacts
          PYTHONDONTWRITEBYTECODE=1 python scripts/source_boundary_manifest.py \
            --json-out /tmp/repopilot-release-evidence/release-artifacts/source-boundary-manifest.json \
            --md-out /tmp/repopilot-release-evidence/release-artifacts/source-boundary-manifest.md
      - name: Validate deployment docs and topology
        run: |
          set -euo pipefail
          PYTHONDONTWRITEBYTECODE=1 python scripts/deployment_validate.py \
            --json-out /tmp/repopilot-release-evidence/release-artifacts/deployment-validation.json \
            --md-out /tmp/repopilot-release-evidence/release-artifacts/deployment-validation.md \
            --allow-warnings
      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ github.run_id }}
          path: /tmp/repopilot-release-evidence/
          if-no-files-found: error

  build-images:
    runs-on: ubuntu-latest
    needs: release-evidence
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - name: Build API image
        run: docker build -t repopilot-api:${{ steps.meta.outputs.tag }} -f apps/api/Dockerfile .
      - name: Build web image
        run: docker build -t repopilot-web:${{ steps.meta.outputs.tag }} -f apps/web/Dockerfile .
      - name: Build sandbox image
        run: docker build -t repopilot-sandbox:${{ steps.meta.outputs.tag }} -f services/sandbox_runner/Dockerfile .
