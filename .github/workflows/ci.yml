name: CI

on:
  push:
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check generated artifacts and secret stores
        run: |
          set -euo pipefail
          forbidden="$(find . \
            \( -path './.git' -o -path './apps/web/node_modules' \) -prune -o \
            \( -name '.DS_Store' -o -name '.secrets' -o -name '__pycache__' -o -name '*.pyc' -o -name '*.egg-info' -o -name '.next' -o -name 'tsconfig.tsbuildinfo' \) \
            -print)"
          if [ -n "$forbidden" ]; then
            echo "$forbidden"
            exit 1
          fi
      - name: Run release hygiene scanner
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/release_hygiene.py --allow-warnings
      - name: Validate deployment documentation and topology
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/deployment_validate.py

  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: repopilot
          POSTGRES_USER: repopilot
          POSTGRES_PASSWORD: repopilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repopilot -d repopilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://repopilot:repopilot@localhost:5432/repopilot
      ALEMBIC_DATABASE_URL: postgresql+psycopg://repopilot:repopilot@localhost:5432/repopilot
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      REPOPILOT_ENV: local
      GITHUB_WEBHOOK_SECRET: ci-webhook-secret
      SESSION_SECRET_KEY: ci-session-secret-ci-session-secret
      MODEL_PROVIDER: mock
      MODEL_NAME: mock-planner
      ENABLE_OTEL: "false"
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/api:${{ github.workspace }}/packages/shared_contracts:${{ github.workspace }}/packages/evals:${{ github.workspace }}/packages/policy_engine:${{ github.workspace }}/packages/llm_client:${{ github.workspace }}/packages/github_client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: pip install -r apps/api/requirements.txt
      - name: Import API app
        run: python -c "from app.main import app; print(app.title)"
        working-directory: apps/api
      - name: Verify migrations from fresh database
        run: python -m app.db.migration_verifier
        working-directory: apps/api
      - name: Run migrations
        run: alembic upgrade head
        working-directory: apps/api
      - name: Run API tests
        run: pytest apps/api/tests -q

  package-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package check dependencies
        run: python -m pip install --upgrade pip setuptools wheel "pydantic>=2.7,<3.0"
      - name: Build and install extracted packages
        run: |
          set -euo pipefail
          rm -rf /tmp/repopilot-package-check
          python -m pip install --no-deps --no-build-isolation \
            --target /tmp/repopilot-package-check \
            packages/shared_contracts \
            packages/evals \
            packages/policy_engine \
            packages/llm_client \
            packages/github_client
          find packages -maxdepth 2 -name '*.egg-info' -type d -prune -exec rm -rf {} +
      - name: Verify extracted package imports
        env:
          PYTHONPATH: /tmp/repopilot-package-check
        run: |
          python - <<'PY'
          from repopilot_contracts import ArtifactReference, CodeQLAlertFetchRequest, CodeQLSarifIngestionRequest, ImplementationPlan
          from repopilot_evals import FixtureVerifier
          from repopilot_policy_engine import PolicyEngine
          from repopilot_llm_client import provider_catalog
          from repopilot_github_client import command_permission_decision

          assert ImplementationPlan(plan_id="p", issue_id="i", rollback_plan="r").requires_human_approval
          assert ArtifactReference(uri="local://artifacts/demo/log.json", artifact_type="validation.log", sha256="0" * 64, byte_size=0).storage_backend == "local"
          assert CodeQLSarifIngestionRequest(sarif={"runs": []}).source == "codeql-sarif"
          assert CodeQLAlertFetchRequest().tool_name == "CodeQL"
          assert FixtureVerifier.__name__ == "FixtureVerifier"
          assert PolicyEngine().config.max_files_changed_without_approval > 0
          assert provider_catalog()
          assert command_permission_decision(command="approve", github_permission="write").allowed
          print("package boundary imports ok")
          PY

  scanner-posture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install scanner evidence tools
        run: python -m pip install --upgrade "semgrep>=1.124,<2.0" "pip-audit>=2.9,<3.0"
      - name: Capture scanner posture and versions
        env:
          SEMGREP_ENABLED: "true"
          DEPENDENCY_AUDIT_ENABLED: "true"
          CODEQL_ENABLED: "false"
        run: |
          set -euo pipefail
          mkdir -p /tmp/repopilot-scanner-posture
          PYTHONDONTWRITEBYTECODE=1 python scripts/security_scanner_snapshot.py \
            --json-out /tmp/repopilot-scanner-posture/security-scanner-snapshot.json \
            --md-out /tmp/repopilot-scanner-posture/security-scanner-snapshot.md \
            --allow-warnings
      - name: Upload scanner posture evidence
        uses: actions/upload-artifact@v4
        with:
          name: security-scanner-posture-${{ github.run_id }}
          path: /tmp/repopilot-scanner-posture/
          if-no-files-found: error

  web-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web
      - name: Typecheck web
        run: npm run typecheck
        working-directory: apps/web

  sandbox-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sandbox image
        run: docker build -t repopilot-sandbox:local -f services/sandbox_runner/Dockerfile .
