[project]
name = "repopilot-evals"
version = "0.1.0"
description = "RepoPilot benchmark fixture definitions and local fixture verification helpers."
requires-python = ">=3.12"
dependencies = [
  "cryptography>=48.0.1,<49",
  "pydantic>=2.7,<3.0",
  "repopilot-contracts==0.1.0",
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project.scripts]
repopilot-evals-report = "repopilot_evals.report:main"
repopilot-provider-planning-eval = "repopilot_evals.provider_harness:main"
repopilot-provider-retrieval-eval = "repopilot_evals.provider_retrieval_harness:main"
repopilot-provider-applied-patch-eval = "repopilot_evals.provider_applied_patch_harness:main"

[tool.setuptools.packages.find]
include = ["repopilot_evals*"]

[tool.pytest.ini_options]
pythonpath = ["."]
